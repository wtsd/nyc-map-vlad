<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NYC Map by Vlad and Katya</title>
  <link rel="stylesheet" href="assets/css/styles.css" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
</head>
<body>
  <header class="topbar">
    <div class="topbar-inner">
      <div class="brand">
        <h1>NYC Map by Vlad and Katya</h1>
        <p>Personal NYC spots for friends and family</p>
      </div>

      <div class="topbar-actions">
        <div class="filters">
          <input id="searchFilter" type="search" placeholder="Search places" oninput="onFiltersChanged()" aria-label="Search places" />
          <select id="categoryFilter" onchange="onFiltersChanged()">
            <option value="">All categories</option>
            <option value="landmarks">Landmarks</option>
            <option value="parks">Parks</option>
            <option value="museums">Museums</option>
            <option value="food">Food</option>
            <option value="viewpoints">Viewpoints</option>
            <option value="hidden-gems">Hidden gems</option>
            <option value="other">Other</option>
          </select>

          <select id="statusFilter" onchange="onFiltersChanged()">
            <option value="">All statuses</option>
            <option value="want">Want</option>
            <option value="visited">Visited</option>
            <option value="favorite">Favorite</option>
            <option value="skip">Skip</option>
          </select>
        </div>

        <div class="header-buttons">
          <button class="secondary-btn icon-btn" onclick="copySummary()" aria-label="Copy summary">
            <svg class="btn-icon" viewBox="0 0 24 24" aria-hidden="true" focusable="false">
              <path d="M16 8a3 3 0 1 0-2.83-4H13a3 3 0 0 0 .17 1l-6.2 3.1a3 3 0 1 0 0 7.8l6.2 3.1A3 3 0 1 0 14 17a2.9 2.9 0 0 0-.83.12l-6.2-3.1a3.08 3.08 0 0 0 0-4.04l6.2-3.1A2.9 2.9 0 0 0 14 7a3 3 0 0 0 2-.77z"></path>
            </svg>
            <span class="sr-only btn-label">Summary</span>
          </button>
          <button class="secondary-btn icon-btn" onclick="toggleLang()" aria-label="Switch language">
            <span class="btn-icon" aria-hidden="true">🌐</span>
            <span class="sr-only btn-label">Switch language</span>
          </button>
        </div>
      </div>
    </div>

    <div class="stats-strip">
      <div class="stat-box">
        <div class="stat-number" id="statTotal">0</div>
        <div class="stat-label">All places</div>
      </div>
      <div class="stat-box">
        <div class="stat-number" id="statWant">0</div>
        <div class="stat-label" id="statWantLabel">➕ Want</div>
      </div>
      <div class="stat-box">
        <div class="stat-number" id="statVisited">0</div>
        <div class="stat-label" id="statVisitedLabel">✅ Visited</div>
      </div>
      <div class="stat-box">
        <div class="stat-number" id="statFavorite">0</div>
        <div class="stat-label" id="statFavoriteLabel">❤️ Favorite</div>
      </div>
    </div>
    <div class="mobile-tabs" role="tablist" aria-label="List and map tabs">
      <button id="tabList" class="mobile-tab active" onclick="switchMobileView('list')" role="tab" aria-selected="true">List</button>
      <button id="tabMap" class="mobile-tab" onclick="switchMobileView('map')" role="tab" aria-selected="false">Map</button>
    </div>
  </header>

  <main class="layout">
    <section id="listSection" class="sidebar-section">
      <div class="sidebar-header">
        <div>
          <p id="resultsCount">Loading...</p>
        </div>
      </div>

      <div id="list" class="card-list"></div>
      <div id="pagination" class="pagination"></div>
    </section>

    <aside id="mapSection" class="map-section">
      <div class="map-card">
        <div class="map-card-header">
          <button id="locateBtn" class="secondary-btn icon-btn" onclick="locateUser()" aria-label="Show my location">
            <span class="btn-icon" aria-hidden="true">📍</span>
            <span class="btn-label">Locate me</span>
          </button>
          <button class="secondary-btn mobile-map-toggle icon-btn" onclick="toggleMap()" aria-label="Toggle map">
            <span class="btn-icon" aria-hidden="true">🗺️</span>
            <span class="btn-label">Show / hide</span>
          </button>
        </div>
        <div id="mapWrap" class="map-wrap">
          <div id="map"></div>
        </div>
      </div>
    </aside>
  </main>

  <footer class="site-footer">
    <div class="site-footer-inner">
      <a href="https://github.com/wtsd/nyc-map-vlad" target="_blank" rel="noopener noreferrer">Repository</a>
      <span>© <span id="footerYear"></span> Vlad & Katya</span>
    </div>
  </footer>

  <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
  <script src="assets/js/common.js"></script>
  <script src="assets/js/app.js"></script>
  <script src="assets/js/map.js"></script>
</body>
</html>
