<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NYC Map by Vlad</title>
  <link rel="stylesheet" href="assets/css/styles.css" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
</head>
<body>
  <header class="topbar">
  <div class="topbar-inner">
    <div class="brand">
      <h1>NYC Map by Vlad and Katya</h1>
      <p>Personal NYC spots for friends and family</p>
    </div>

    <div class="topbar-actions">
      <div class="filters">
        <select id="categoryFilter" onchange="render()">
          <option value="">All categories</option>
          <option value="landmarks">Landmarks</option>
          <option value="parks">Parks</option>
          <option value="museums">Museums</option>
          <option value="food">Food</option>
          <option value="viewpoints">Viewpoints</option>
          <option value="hidden-gems">Hidden gems</option>
          <option value="other">Other</option>
        </select>

        <select id="statusFilter" onchange="render()">
          <option value="">All statuses</option>
          <option value="want">Want</option>
          <option value="visited">Visited</option>
          <option value="favorite">Favorite</option>
          <option value="skip">Skip</option>
        </select>
      </div>

      <div class="header-buttons">
        <button class="secondary-btn" onclick="copySummary()">Copy summary</button>
        <button class="secondary-btn" onclick="toggleLang()">EN / RU</button>
      </div>
    </div>
  </div>

  <div class="stats-strip">
    <div class="stat-box">
      <div class="stat-number" id="statTotal">0</div>
      <div class="stat-label">All places</div>
    </div>
    <div class="stat-box">
      <div class="stat-number" id="statWant">0</div>
      <div class="stat-label">Want</div>
    </div>
    <div class="stat-box">
      <div class="stat-number" id="statVisited">0</div>
      <div class="stat-label">Visited</div>
    </div>
    <div class="stat-box">
      <div class="stat-number" id="statFavorite">0</div>
      <div class="stat-label">Favorite</div>
    </div>
  </div>
</header>

  <main class="layout">
    <section class="sidebar-section">
      <div class="sidebar-header">
        <div>
          <h2>Places</h2>
          <p id="resultsCount">Loading...</p>
        </div>
      </div>

      <div id="list" class="card-list"></div>
    </section>

    <aside class="map-section">
      <div class="map-card">
        <div class="map-card-header">
          <h2>Map View</h2>
          <button class="secondary-btn mobile-map-toggle" onclick="toggleMap()">Show / hide</button>
        </div>
        <div id="mapWrap" class="map-wrap">
          <div id="map"></div>
        </div>
      </div>
    </aside>
  </main>

  <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
  <script src="assets/js/app.js"></script>
  <script src="assets/js/map.js"></script>
</body>
</html>
