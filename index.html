<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NYC Map by Vlad and Katya</title>
  <link rel="stylesheet" href="assets/css/styles.css" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster/dist/MarkerCluster.css" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster/dist/MarkerCluster.Default.css" />
</head>
<body>
  <header class="topbar">
    <div class="topbar-inner">
      <div class="brand">
        <h1>NYC Map by Vlad and Katya</h1>
        <p>Personal NYC spots for friends and family</p>
      </div>

      <div class="topbar-actions">
        <div class="filters primary-filters">
          <input id="searchFilter" type="search" placeholder="Search" oninput="onFiltersChanged()" aria-label="Search" />
        </div>

        <div class="header-buttons">
          <button id="filtersToggle" class="secondary-btn icon-btn filters-toggle" onclick="toggleFiltersPanel()" aria-expanded="false" aria-controls="secondaryControls">
            <span class="btn-icon" aria-hidden="true">⚙️</span>
            <span class="btn-label">Filters</span>
          </button>
          <button class="secondary-btn icon-btn" onclick="copySummary()" aria-label="Copy summary">
            <svg class="btn-icon" viewBox="0 0 24 24" aria-hidden="true" focusable="false">
              <path d="M16 8a3 3 0 1 0-2.83-4H13a3 3 0 0 0 .17 1l-6.2 3.1a3 3 0 1 0 0 7.8l6.2 3.1A3 3 0 1 0 14 17a2.9 2.9 0 0 0-.83.12l-6.2-3.1a3.08 3.08 0 0 0 0-4.04l6.2-3.1A2.9 2.9 0 0 0 14 7a3 3 0 0 0 2-.77z"></path>
            </svg>
          </button>
          <button class="secondary-btn icon-btn" onclick="toggleLang()" aria-label="Switch language">
            <span class="btn-icon" aria-hidden="true">🌎</span>
          </button>
        </div>
      </div>
    </div>

    <div id="secondaryControls" class="secondary-controls">
      <div class="stats-strip">
        <div class="filters secondary-filters">
          <select id="categoryFilter" onchange="onFiltersChanged()">
            <option value="">All categories</option>
            <option value="landmarks">Landmarks</option>
            <option value="parks">Parks</option>
            <option value="museums">Museums</option>
            <option value="food">Food</option>
            <option value="viewpoints">Viewpoints</option>
            <option value="hidden-gems">Hidden gems</option>
            <option value="other">Other</option>
          </select>
        </div>
      <div class="status-filter-tabs" role="tablist" aria-label="Status filters">
        <button class="status-filter-tab stat-filter-btn active" type="button" data-status="" onclick="setStatusFilter('')">
          <span class="stat-number" id="statTotal">0</span>
          <span class="stat-filter-label">All</span>
        </button>
        <button class="status-filter-tab stat-filter-btn" type="button" data-status="want" onclick="setStatusFilter('want')">
          <span class="stat-number" id="statWant">0</span>
          <span class="stat-filter-label" id="statWantLabel">Want</span>
        </button>
        <button class="status-filter-tab stat-filter-btn" type="button" data-status="skip" onclick="setStatusFilter('skip')">
          <span class="stat-number" id="statSkip">0</span>
          <span class="stat-filter-label" id="statSkipLabel">Skip</span>
        </button>
        <button class="status-filter-tab stat-filter-btn" type="button" data-status="visited" onclick="setStatusFilter('visited')">
          <span class="stat-number" id="statVisited">0</span>
          <span class="stat-filter-label" id="statVisitedLabel">Visited</span>
        </button>
      </div>
      <div class="personal-filter-tabs" role="tablist" aria-label="Personal filters">
        <button class="personal-filter-tab active" type="button" data-personal="" onclick="setPersonalFilter('')">
          <span id="personalAllLabel">Personal: all</span>
        </button>
        <button class="personal-filter-tab" type="button" data-personal="want-to-go" onclick="setPersonalFilter('want-to-go')">
          <span aria-hidden="true">🟦</span>
          <span id="personalWantLabel">Want to go</span>
        </button>
        <button class="personal-filter-tab" type="button" data-personal="been-not-impressed" onclick="setPersonalFilter('been-not-impressed')">
          <span aria-hidden="true">⬜</span>
          <span id="personalNotImpressedLabel">Not impressed</span>
        </button>
        <button class="personal-filter-tab" type="button" data-personal="highly-recommend" onclick="setPersonalFilter('highly-recommend')">
          <span aria-hidden="true">🟩</span>
          <span id="personalRecommendLabel">Highly recommend</span>
        </button>
      </div>
    </div>
    </div>
    <div class="mobile-tabs" role="tablist" aria-label="List and map tabs">
      <button id="tabList" class="mobile-tab active" onclick="switchMobileView('list')" role="tab" aria-selected="true">List</button>
      <button id="tabMap" class="mobile-tab" onclick="switchMobileView('map')" role="tab" aria-selected="false">Map</button>
    </div>
  </header>

  <main class="layout">
    <section id="listSection" class="sidebar-section">
      <div id="paginationTop" class="pagination"></div>
      <div id="list" class="card-list"></div>
      <div id="pagination" class="pagination"></div>
    </section>

    <aside id="mapSection" class="map-section">
      <div class="map-card">
        <div class="map-card-header">
          <button id="locateBtn" class="secondary-btn icon-btn" onclick="locateUser()" aria-label="Show my location">
            <span class="btn-icon" aria-hidden="true">📍</span>
            <span class="btn-label">Locate me</span>
          </button>
          <button class="secondary-btn mobile-map-toggle icon-btn" onclick="toggleMap()" aria-label="Toggle map">
            <span class="btn-icon" aria-hidden="true">🗺️</span>
            <span class="btn-label">Show / hide</span>
          </button>
        </div>
        <div id="mapWrap" class="map-wrap">
          <div id="map"></div>
        </div>
        <div id="mapLegend" class="map-legend" aria-live="polite"></div>
      </div>
    </aside>
  </main>

  <footer class="site-footer">
    <div class="site-footer-inner">
      <a href="https://github.com/wtsd/nyc-map-vlad" target="_blank" rel="noopener noreferrer">Repository</a>
      <span>© <span id="footerYear"></span> Vlad & Katya</span>
    </div>
  </footer>

  <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
  <script src="https://unpkg.com/leaflet.markercluster/dist/leaflet.markercluster.js"></script>
  <script src="assets/js/common.js"></script>
  <script src="assets/js/state.js"></script>
  <script src="assets/js/ui-text.js"></script>
  <script src="assets/js/filters.js"></script>
  <script src="assets/js/url-state.js"></script>
  <script src="assets/js/list-view.js"></script>
  <script src="assets/js/app.js"></script>
  <script src="assets/js/map.js"></script>
</body>
</html>
