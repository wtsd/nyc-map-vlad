<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NYC Map</title>
  <link rel="stylesheet" href="assets/css/styles.css?v=a4710438eb" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster/dist/MarkerCluster.css" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster/dist/MarkerCluster.Default.css" />
</head>
<body>
  <header class="topbar">
    <div class="topbar-inner">
      <div class="brand">
        <h1>NYC Map</h1>
        <p>by Katya and Vlad</p>
      </div>

      <div class="topbar-actions">
        <div class="filters primary-filters">
          <input id="searchFilter" type="search" placeholder="Search" oninput="onFiltersChanged()" aria-label="Search" />
        </div>

        <div class="header-buttons">
          <button id="filtersToggle" class="secondary-btn icon-btn filters-toggle" onclick="toggleFiltersPanel()" aria-expanded="false" aria-controls="secondaryControls">
            <span class="btn-icon" aria-hidden="true">☰</span>
            <span class="btn-label sr-only">Filters</span>
          </button>
          <button class="secondary-btn icon-btn" onclick="copySummary()" aria-label="Copy summary">
            <svg class="btn-icon" viewBox="0 0 24 24" aria-hidden="true" focusable="false">
              <path d="M16 8a3 3 0 1 0-2.83-4H13a3 3 0 0 0 .17 1l-6.2 3.1a3 3 0 1 0 0 7.8l6.2 3.1A3 3 0 1 0 14 17a2.9 2.9 0 0 0-.83.12l-6.2-3.1a3.08 3.08 0 0 0 0-4.04l6.2-3.1A2.9 2.9 0 0 0 14 7a3 3 0 0 0 2-.77z"></path>
            </svg>
          </button>
          <button class="secondary-btn icon-btn" onclick="toggleLang()" aria-label="Switch language">
            <span class="btn-icon" aria-hidden="true">🌎</span>
          </button>
        </div>
      </div>
    </div>

    <div id="secondaryControls" class="secondary-controls">
      <div class="stats-strip">
        <div id="categoryFilterGroup" class="filters secondary-filters category-filter-group" role="group" aria-label="Category filters">
          <label class="category-filter-chip">
            <input type="checkbox" value="landmarks" onchange="onFiltersChanged()">
            <span>Landmarks</span>
          </label>
          <label class="category-filter-chip">
            <input type="checkbox" value="parks" onchange="onFiltersChanged()">
            <span>Parks</span>
          </label>
          <label class="category-filter-chip">
            <input type="checkbox" value="museums" onchange="onFiltersChanged()">
            <span>Museums</span>
          </label>
          <label class="category-filter-chip">
            <input type="checkbox" value="food" onchange="onFiltersChanged()">
            <span>Food</span>
          </label>
          <label class="category-filter-chip">
            <input type="checkbox" value="viewpoints" onchange="onFiltersChanged()">
            <span>Viewpoints</span>
          </label>
          <label class="category-filter-chip">
            <input type="checkbox" value="hidden-gems" onchange="onFiltersChanged()">
            <span>Hidden gems</span>
          </label>
          <label class="category-filter-chip">
            <input type="checkbox" value="other" onchange="onFiltersChanged()">
            <span>Other</span>
          </label>
        </div>
      <div class="personal-toggle-group" role="group" aria-label="Personal filters">
        <label class="personal-toggle-chip" title="Want to visit">
          <input id="personalTodoToggle" type="checkbox" value="to-do" aria-label="Want to visit" onchange="onPersonalToggleChanged()">
          <span>❔</span>
        </label>
        <label class="personal-toggle-chip" title="Visited by Katya and Vlad">
          <input id="personalVisitedToggle" type="checkbox" value="visited" aria-label="Visited by Katya and Vlad" onchange="onPersonalToggleChanged()">
          <span>✅</span>
        </label>
      </div>
      <div class="status-filter-tabs" role="tablist" aria-label="Status filters">
        <button class="status-filter-tab stat-filter-btn active" type="button" data-status="" onclick="setStatusFilter('')">
          <span class="stat-number" id="statTotal">0</span>
          <span class="stat-filter-label">All</span>
        </button>
        <button class="status-filter-tab stat-filter-btn" type="button" data-status="want" onclick="setStatusFilter('want')">
          <span class="stat-number" id="statWant">0</span>
          <span class="stat-filter-label" id="statWantLabel">Want</span>
        </button>
        <button class="status-filter-tab stat-filter-btn" type="button" data-status="skip" onclick="setStatusFilter('skip')">
          <span class="stat-number" id="statSkip">0</span>
          <span class="stat-filter-label" id="statSkipLabel">Skip</span>
        </button>
        <button class="status-filter-tab stat-filter-btn" type="button" data-status="visited" onclick="setStatusFilter('visited')">
          <span class="stat-number" id="statVisited">0</span>
          <span class="stat-filter-label" id="statVisitedLabel">Visited</span>
        </button>
      </div>
    </div>
    </div>
    <div class="mobile-tabs" role="tablist" aria-label="List and map tabs">
      <button id="tabList" class="mobile-tab active" onclick="switchMobileView('list')" role="tab" aria-selected="true">List</button>
      <button id="tabMap" class="mobile-tab" onclick="switchMobileView('map')" role="tab" aria-selected="false">Map</button>
    </div>
  </header>

  <main class="layout">
    <section id="listSection" class="sidebar-section">
      <div id="paginationTop" class="pagination"></div>
      <div id="list" class="card-list"></div>
      <div id="pagination" class="pagination"></div>
    </section>

    <aside id="mapSection" class="map-section">
      <div class="map-card">
        <div class="map-card-header">
          <button class="secondary-btn mobile-map-toggle icon-btn" onclick="toggleMap()" aria-label="Toggle map">
            <span class="btn-icon" aria-hidden="true">🗺️</span>
            <span class="btn-label">Show / hide</span>
          </button>
        </div>
        <div id="mapWrap" class="map-wrap">
          <button id="locateBtn" class="secondary-btn icon-btn map-locate-btn" onclick="locateUser()" aria-label="Show my location">
            <span class="btn-icon" aria-hidden="true">📍</span>
            <span class="btn-label">Locate me</span>
          </button>
          <div id="map"></div>
        </div>
        <div id="mapLegend" class="map-legend" aria-live="polite"></div>
      </div>
    </aside>
  </main>

  <footer class="site-footer">
    <div class="site-footer-inner">
      <a href="https://github.com/wtsd/nyc-map-vlad" target="_blank" rel="noopener noreferrer">Repository</a>
      <span>© <span id="footerYear"></span> Vlad & Katya</span>
    </div>
  </footer>

  <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
  <script src="https://unpkg.com/leaflet.markercluster/dist/leaflet.markercluster.js"></script>
  <script src="assets/js/common.js?v=a4710438eb"></script>
  <script src="assets/js/state.js?v=a4710438eb"></script>
  <script src="assets/js/ui-text.js?v=a4710438eb"></script>
  <script src="assets/js/filters.js?v=a4710438eb"></script>
  <script src="assets/js/url-state.js?v=a4710438eb"></script>
  <script src="assets/js/data-loader.js?v=a4710438eb"></script>
  <script src="assets/js/list-view.js?v=a4710438eb"></script>
  <script src="assets/js/app.js?v=a4710438eb"></script>
  <script src="assets/js/map.js?v=a4710438eb"></script>
</body>
</html>
