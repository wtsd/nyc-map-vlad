<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Place | NYC Map by Vlad and Katya</title>
  <link rel="stylesheet" href="assets/css/styles.css" />
</head>
<body class="place-page">
  <header class="topbar">
    <div class="topbar-inner">
      <div class="brand">
        <h1 id="pageTitle">Place</h1>
        <p id="pageSubtitle">NYC Map by Vlad and Katya</p>
      </div>

      <div class="header-buttons">
        <a class="secondary-btn icon-btn" href="index.html" aria-label="Back to map">
          <span class="btn-icon monochrome-icon" aria-hidden="true">←</span>
          <span class="sr-only btn-label">Back</span>
        </a>
        <button class="secondary-btn icon-btn" onclick="toggleLang()" aria-label="Switch language">
          <span class="btn-icon monochrome-icon" aria-hidden="true">⌘</span>
          <span class="sr-only btn-label">EN / RU</span>
        </button>
      </div>
    </div>
  </header>

  <main class="layout place-layout">
    <section class="place-main">
      <article class="place-card">
        <div class="place-image-wrap">
          <img id="placeImage" src="" alt="" loading="lazy"
               onerror="this.style.display='none'; document.getElementById('placeImageFallback').classList.remove('hidden');">
          <div id="placeImageFallback" class="card-image-fallback hidden">Photo coming later</div>
        </div>

        <div class="place-body">
          <div class="card-topline">
            <h2 id="placeName" class="card-title">Loading...</h2>
            <div id="placeCategory" class="card-category"></div>
          </div>

          <div class="meta-row">
            <span id="placeTime" class="chip"></span>
            <span id="placeCost" class="chip"></span>
          </div>

          <p id="placeSummary" class="summary"></p>

          <div class="transit-row">
            <span id="transitLabel">Transit:</span>
            <span class="mta-icon" aria-hidden="true">MTA</span>
            <strong id="placeTransit"></strong>
          </div>

          <div class="status-row">
            <button id="btnWant" class="status-btn icon-btn" onclick="setStatus(currentPlace.id, 'want')" aria-label="Want to visit">
              <span class="btn-icon monochrome-icon" aria-hidden="true">○</span>
              <span class="sr-only">Want</span>
            </button>
            <button id="btnVisited" class="status-btn icon-btn" onclick="setStatus(currentPlace.id, 'visited')" aria-label="Visited">
              <span class="btn-icon monochrome-icon" aria-hidden="true">✓</span>
              <span class="sr-only">Visited</span>
            </button>
            <button id="btnFavorite" class="status-btn icon-btn" onclick="setStatus(currentPlace.id, 'favorite')" aria-label="Favorite">
              <span class="btn-icon monochrome-icon" aria-hidden="true">♥</span>
              <span class="sr-only">Favorite</span>
            </button>
            <button id="btnSkip" class="status-btn icon-btn" onclick="setStatus(currentPlace.id, 'skip')" aria-label="Skip">
              <span class="btn-icon monochrome-icon" aria-hidden="true">✕</span>
              <span class="sr-only">Skip</span>
            </button>
          </div>

          <div class="card-footer">
            <div class="card-footer-actions">
              <button class="copy-btn icon-btn icon-only-btn" onclick="copyCurrentPlace()" aria-label="Copy place details">
                <svg class="btn-icon" viewBox="0 0 24 24" aria-hidden="true" focusable="false">
                  <rect x="9" y="9" width="11" height="11" rx="2"></rect>
                  <path d="M15 9V6a2 2 0 0 0-2-2H6a2 2 0 0 0-2 2v7a2 2 0 0 0 2 2h3"></path>
                </svg>
                <span class="sr-only btn-label">Copy</span>
              </button>
              <a class="primary-link-btn icon-btn icon-only-btn" id="openMapLink" href="index.html" aria-label="Open map">
                <svg class="btn-icon" viewBox="0 0 24 24" aria-hidden="true" focusable="false">
                  <path d="M7 17 17 7"></path>
                  <path d="M7 7h10v10"></path>
                </svg>
                <span class="sr-only btn-label">Open map</span>
              </a>
            </div>
          </div>
        </div>
      </article>
    </section>
  </main>

  <script src="assets/js/common.js"></script>
  <script src="assets/js/place.js"></script>
</body>
</html>
