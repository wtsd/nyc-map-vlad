<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Place | NYC Map by Vlad and Katya</title>
  <meta id="placeMetaDescription" name="description" content="NYC Map place details by Vlad and Katya." />
  <link rel="stylesheet" href="assets/css/styles.css?v=2cc8da0282" />
</head>
<body class="place-page">
  <header class="topbar">
    <div class="topbar-inner">
      <div class="brand">
        <h1 id="pageTitle">Place</h1>
        <p id="pageSubtitle">NYC Map by Vlad and Katya</p>
      </div>

      <div class="topbar-actions">
        <div class="header-buttons">
          <a class="secondary-btn icon-btn" href="index.html" aria-label="Back to map">
            <span class="btn-icon" aria-hidden="true">←</span>
            <span class="sr-only btn-label">Back</span>
          </a>
          <button class="secondary-btn icon-btn" onclick="toggleLang()" aria-label="Switch language">
            <span class="btn-icon" aria-hidden="true">🌎</span>
            <span class="sr-only btn-label">EN / RU</span>
          </button>
        </div>
      </div>
    </div>
  </header>

  <main class="layout place-layout">
    <section class="place-main">
      <article class="place-card card">
        <div class="place-image-wrap">
          <img id="placeImage" src="" alt="" loading="lazy"
               onerror="this.style.display='none'; document.getElementById('placeImageFallback').classList.remove('hidden');">
          <div id="placeImageFallback" class="card-image-fallback hidden">Photo coming later</div>
        </div>

        <div class="place-body card-body">
          <div class="card-topline">
            <h2 id="placeName" class="card-title">Loading...</h2>
            <div id="placeCategory" class="card-category"></div>
          </div>

          <div class="meta-details" aria-label="Place metadata">
            <div class="meta-item">
              <span class="meta-item-label" id="metaAddressLabel">Address</span>
              <a id="placeAddressLink" class="meta-item-value address-btn" href="#" target="_blank" rel="noopener noreferrer">
                <span aria-hidden="true">📍</span>
                <span id="placeAddress"></span>
              </a>
            </div>
            <div class="meta-item">
              <span class="meta-item-label" id="metaPriceLabel">Price</span>
              <span id="placePrice" class="chip price-chip"></span>
            </div>
          </div>

          <p id="placeSummary" class="summary"></p>
          <div id="placeExternalRow" class="external-row hidden">
            <a id="placeExternalLink" class="address-btn external-btn" href="#" target="_blank" rel="noopener noreferrer">
              <span aria-hidden="true">↗</span>
              <span id="placeExternalLabel"></span>
            </a>
          </div>

          <div class="status-row">
            <label class="compact-check" title="Visited">
              <input id="btnVisited" type="checkbox" onchange="setVisited(currentPlace.id, this.checked)" aria-label="Visited">
              <span aria-hidden="true">✅</span>
            </label>
          </div>

          <div class="card-footer">
            <div class="card-footer-actions">
              <button class="copy-btn icon-btn" onclick="copyCurrentPlace()" aria-label="Copy place summary">
                <svg class="btn-icon" viewBox="0 0 24 24" aria-hidden="true" focusable="false">
                  <rect x="9" y="9" width="11" height="11" rx="2"></rect>
                  <path d="M15 9V6a2 2 0 0 0-2-2H6a2 2 0 0 0-2 2v7a2 2 0 0 0 2 2h3"></path>
                </svg>
                <span class="btn-label">Copy summary</span>
              </button>
              <a class="primary-link-btn icon-btn" id="openMapLink" href="index.html" aria-label="Open in maps" target="_blank" rel="noopener noreferrer">
                <svg class="btn-icon" viewBox="0 0 24 24" aria-hidden="true" focusable="false">
                  <path d="M9.5 4.75a6 6 0 0 1 9 5.2c0 3.63-4.5 8.8-4.5 8.8s-4.5-5.17-4.5-8.8a6 6 0 0 1 0-5.2z"></path>
                  <circle cx="14" cy="10" r="2.2"></circle>
                  <path d="M4 7.5v11.75l6-2.25 8 2.25 2-11.75-8-2.25z"></path>
                </svg>
                <span class="btn-label">Open in Maps</span>
              </a>
              <a class="secondary-btn icon-btn" id="backToListLink" href="index.html" aria-label="Back to list">
                <span class="btn-icon" aria-hidden="true">←</span>
                <span class="btn-label">Back to list</span>
              </a>
            </div>
          </div>
        </div>
      </article>
    </section>
  </main>

  <script src="assets/js/common.js?v=2cc8da0282"></script>
  <script src="assets/js/data-loader.js?v=2cc8da0282"></script>
  <script src="assets/js/place.js?v=2cc8da0282"></script>
</body>
</html>
