name: Add Place

on:
  workflow_dispatch:
    inputs:
      category:
        description: "Category folder under places/"
        required: true
        type: choice
        options:
          - food
          - hidden-gems
          - landmarks
          - museums
          - other
          - parks
          - viewpoints
      title_en:
        description: "English title"
        required: true
        type: string
      title_ru:
        description: "Russian title"
        required: false
        default: ""
        type: string
      address:
        description: "Address"
        required: true
        type: string
      personal:
        description: "Personal status"
        required: false
        default: "to-do"
        type: choice
        options:
          - ""
          - to-do
          - visited
          - want-to-go
          - been-not-impressed
          - highly-recommend
          - highly-recommended
      price:
        description: "Optional price (e.g. $$)"
        required: false
        default: "$"
        type: string
      external_link:
        description: "Optional external link"
        required: false
        default: ""
        type: string
      summary_en:
        description: "EN summary markdown"
        required: false
        default: ""
        type: string
      summary_ru:
        description: "RU summary markdown"
        required: false
        default: ""
        type: string

permissions:
  contents: write
  pull-requests: write

defaults:
  run:
    shell: bash

jobs:
  add-place:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2

      - name: Validate inputs
        id: prepare
        run: |
          set -euo pipefail
          category='${{ inputs.category }}'
          [[ "$category" =~ ^[a-z0-9-]+$ ]] || {
            echo "Invalid category: $category"
            echo "Use lowercase letters, numbers, and dashes only."
            exit 1
          }
          python - <<'PY' >> "$GITHUB_OUTPUT"
          import re
          import urllib.parse
          import urllib.request
          import json

          title = "${{ inputs.title_en }}".strip()
          address = "${{ inputs.address }}".strip()

          if not title:
              raise SystemExit("title_en cannot be empty")
          if not address:
              raise SystemExit("address cannot be empty")

          slug = re.sub(r"[^a-z0-9]+", "-", title.lower()).strip("-")
          slug = re.sub(r"-{2,}", "-", slug)
          if not slug:
              raise SystemExit("Could not derive a valid slug from title_en")

          params = urllib.parse.urlencode({
              "q": address,
              "format": "jsonv2",
              "limit": 1,
              "addressdetails": 0,
          })
          req = urllib.request.Request(
              f"https://nominatim.openstreetmap.org/search?{params}",
              headers={"User-Agent": "nyc-map-add-place-workflow/1.0"},
          )
          with urllib.request.urlopen(req, timeout=20) as resp:
              data = json.loads(resp.read().decode("utf-8"))

          if not data:
              raise SystemExit(f"No geocoding results for address: {address}")

          lat = float(data[0]["lat"])
          lng = float(data[0]["lon"])

          if not (-90 <= lat <= 90 and -180 <= lng <= 180):
              raise SystemExit("Resolved lat/lng are out of valid range")

          print(f"slug={slug}")
          print(f"lat={lat:.7f}")
          print(f"lng={lng:.7f}")
          PY

      - name: Create place files
        run: |
          set -euo pipefail
          place_dir="places/${{ inputs.category }}/${{ steps.prepare.outputs.slug }}"
          if [[ -d "$place_dir" ]]; then
            echo "Place already exists: $place_dir"
            exit 1
          fi

          mkdir -p "$place_dir"

          printf '%s\n' \
            'id: ${{ steps.prepare.outputs.slug }}' \
            'title:' \
            '  en: "${{ inputs.title_en }}"' \
            '  ru: "${{ inputs.title_ru }}"' \
            'coords:' \
            '  lat: ${{ steps.prepare.outputs.lat }}' \
            '  lng: ${{ steps.prepare.outputs.lng }}' \
            'category:' \
            '  - ${{ inputs.category }}' \
            'address: "${{ inputs.address }}"' \
            'personal: "${{ inputs.personal }}"' \
            'price: "${{ inputs.price }}"' \
            'external_link: "${{ inputs.external_link }}"' \
            > "$place_dir/meta.yml"

          printf '%s\n' '${{ inputs.summary_en }}' > "$place_dir/en.md"
          printf '%s\n' '${{ inputs.summary_ru }}' > "$place_dir/ru.md"

      - name: Setup Python
        uses: actions/setup-python@v6.2.0
        with:
          python-version: '3.11'

      - name: Install deps
        run: pip install pyyaml pillow

      - name: Validate by building
        run: python scripts/build.py

      - name: Create pull request
        if: ${{ secrets.PR_CREATOR_TOKEN != '' }}
        uses: peter-evans/create-pull-request@v7
        with:
          # Use a PAT because some repos/orgs disable PR creation via GITHUB_TOKEN.
          token: ${{ secrets.PR_CREATOR_TOKEN }}
          commit-message: "Add place: ${{ steps.prepare.outputs.slug }}"
          branch: "automation/add-place-${{ steps.prepare.outputs.slug }}"
          delete-branch: true
          title: "Add place: ${{ inputs.title_en }}"
          body: |
            Adds a new place via manual workflow_dispatch.

            ## Inputs
            - Category: `${{ inputs.category }}`
            - Slug (auto-generated): `${{ steps.prepare.outputs.slug }}`
            - Title (EN): `${{ inputs.title_en }}`
            - Coordinates (auto-geocoded): `${{ steps.prepare.outputs.lat }}, ${{ steps.prepare.outputs.lng }}`
            - Address: `${{ inputs.address }}`

      - name: Fail when PR token is missing
        if: ${{ secrets.PR_CREATOR_TOKEN == '' }}
        run: |
          echo "Missing repository secret PR_CREATOR_TOKEN."
          echo "Create a fine-grained PAT with Contents: Read/Write and Pull requests: Read/Write"
          echo "and save it as PR_CREATOR_TOKEN in repository secrets."
          exit 1
